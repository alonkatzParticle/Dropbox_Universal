services:
  app:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3005:3000"   # 3005 = next available port on the shared VPS
    env_file:
      - .env          # copy from vercel dashboard — see DEPLOY.md
    environment:
      NODE_ENV: production
      # KV_REST_API_URL is intentionally NOT set → triggers file-based storage
    volumes:
      # Persist config/state/logs across container rebuilds.
      # lib/storage.ts writes to process.cwd()/../ = /app/ when running on VPS.
      - ./config.json:/app/config.json
      - ./state.json:/app/state.json
      - ./logs.json:/app/logs.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/auto"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
